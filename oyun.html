<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.html">
</head>
<body style=" background-color: aquamarine; ">
        <canvas id="c" width="500" height="500" style="background-color:white ; border:1px solid black;color:violet"></canvas>
    
     <script>
        let x=0;
        let y=0;
        let durum=false;
        let durum2=false;
        let hiz = 20;

        let p = 300;
        let n = 300;
        const peynir = new Image();
        peynir.src = "peynir.jpg";
      
        const canvas=document.getElementById("c");
        const ctx=canvas.getContext("2d");
        const img = new Image();
    img.src = 'karakter.jpg';
    
        function draw(){
      
            ctx.clearRect(0,0,500,500);
            ctx.drawImage(peynir, p, n, 50, 50);
            
            ctx.drawImage(img,x,y,60,60);
          
        
        
        if (x < p + 100 && x + 100 >  p && y < n + 100 && y + 100 > n) {
                // kordinat
                p = Math.floor(Math.random() * 440);
                n = Math.floor(Math.random() * 440);
            }

            requestAnimationFrame(draw);
        }
        draw();
        document.addEventListener("keydown",function(e){
          durum=true ;
          if (e.key === "ArrowRight") {
            
                x += hiz; // Sağa git
            } else if (e.key === "ArrowLeft") {
                x -= hiz; // Sola git
            } else if (e.key === "ArrowUp") {
                y -= hiz; // Yukarı git
            } else if (e.key === "ArrowDown") {
                y += hiz; // Aşağı git
            }
            
              if (x < 0) x = 0;
            if (y < 0) y = 0;
            if (x > 500) x = 500; 
            if (y > 500) y = 500;
        });
          

       
        draw();
        </script><br>
<a href="index.html">anasayfaya dön</a><br><p>(✿◡‿◡)</p>
</body>
</html>
