<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Üyelik Sistemi</title>

<style>

body{
    background:brown;
    font-family:Arial;
}

.kutu{
    width:350px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    border:4px solid black;
}

input{
    width:95%;
    padding:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;
}

ul{
    padding:0;
}

li{
    list-style:none;
    background:#f1f1f1;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="kutu">

<h2>Ad</h2>
<input type="text" id="ad" placeholder="Adınız">

<h2>Soyad</h2>
<input type="text" id="soyad" placeholder="Soyadınız">

<h2>Email</h2>
<input type="email" id="email" placeholder="Email">

<h2>Kullanıcı Adı</h2>
<input type="text" id="kullaniciAdi" placeholder="Kullanıcı Adı">

<h2>Şifre</h2>
<input type="password" id="sifre" placeholder="Şifre">

<h2>Takım Seç</h2>

<label>
<input type="radio" name="takim" value="Beşiktaş">
Beşiktaş
</label>

<br>

<label>
<input type="radio" name="takim" value="Galatasaray">
Galatasaray
</label>

<br>

<label>
<input type="radio" name="takim" value="Fenerbahçe">
Fenerbahçe
</label>

<br><br>

<button onclick="kayitOl()">
Kayıt Ol
</button>

<h2>Kayıtlı Kullanıcılar</h2>

<ul id="kullaniciListesi"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



// Firebase Ayarların

const firebaseConfig = {

apiKey: "AIzaSyB9HMloL9KI80438GFZdccJzSpARlg065w",
  authDomain: "yeniproje-fbdb9.firebaseapp.com",
  projectId: "yeniproje-fbdb9",
  storageBucket: "yeniproje-fbdb9.firebasestorage.app",
  messagingSenderId: "591871882357",
  appId: "1:591871882357:web:215b2a005149c2dd5d343c",
  measurementId: "G-WVJ610BVNP"

};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

// Firebase Başlat



const auth = getAuth(app);

const db = getFirestore(app);



// KAYIT OL

window.kayitOl = async function(){

const ad = document.getElementById("ad").value;

const soyad = document.getElementById("soyad").value;

const email = document.getElementById("email").value;

const kullaniciAdi = document.getElementById("kullaniciAdi").value;

const sifre = document.getElementById("sifre").value;

const takimSecimi = document.querySelector('input[name="takim"]:checked');

const takim = takimSecimi ? takimSecimi.value : "";


// Boş alan kontrolü

if(
ad === "" ||
soyad === "" ||
email === "" ||
kullaniciAdi === "" ||
sifre === ""
){
alert("Tüm alanları doldurun");
return;
}


try{

// Firebase Auth kayıt

const userCredential = await createUserWithEmailAndPassword(
auth,
email,
sifre
);

const user = userCredential.user;


// Firestore kayıt

await setDoc(doc(db,"kullanicilar",user.uid),{

ad: ad,

soyad: soyad,

email: email,

kullaniciAdi: kullaniciAdi,

takim: takim,

uid: user.uid

});

alert("Kayıt başarılı");


// Listeyi Güncelle

kullanicilariGetir();

}
catch(error){

alert(error.message);

console.log(error);

}

}



// KULLANICILARI GETİR

async function kullanicilariGetir(){

const liste = document.getElementById("kullaniciListesi");

liste.innerHTML = "";

const querySnapshot = await getDocs(
collection(db,"kullanicilar")
);

querySnapshot.forEach((doc) => {

const veri = doc.data();

const li = document.createElement("li");

li.innerHTML = `

<b>${veri.ad} ${veri.soyad}</b>
<br>

Email: ${veri.email}
<br>

Kullanıcı Adı: ${veri.kullaniciAdi}
<br>

Takım: ${veri.takim}

`;

liste.appendChild(li);

});

}


// Sayfa Açılınca Listele

kullanicilariGetir();

</script>

</body>
</html>
