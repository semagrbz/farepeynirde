<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üyelik Sistemi</title>

    <style>
    body{
        background-color:brown;
        font-family: Arial;
    }

    .kutu{
        width: 300px;
        margin: 30px auto;
        border: 5px solid black;
        background-color: azure;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        border-radius: 10px;
    }

    /* Sadece text, email ve password inputlarını etkilesin, radio butonları bozmasın diye güncellendi */
    input[type="text"], input[type="email"], input[type="password"] {
        width: 90%;
        padding: 8px;
    }

    button{
        padding:10px;
        width:95%;
        cursor:pointer;
        background:black;
        color:white;
        border:none;
        margin-top:15px;
    }
    </style>
</head>
<body>

<div class="kutu">
    <h2>Adınızı Giriniz</h2>
    <input type="text" id="ad" placeholder="Adınızı giriniz"><br>

    <h2>Soyadınızı Giriniz</h2>
    <input type="text" id="soyad" placeholder="Soyadınızı giriniz"><br>

    <h2>E-postanızı Giriniz</h2>
    <input type="email" id="email" placeholder="@işareti kullanarak giriniz"><br>

    <h2>Kullanıcı Adı</h2>
    <input type="text" id="kullaniciAdi" placeholder="Kullanıcı adı girin"><br>

    <h2>Şifre</h2>
    <input type="password" id="sifre" placeholder="Şifre giriniz"><br>

    <h2>Takım Seçin</h2>

    <label>
        <input type="radio" name="takim" value="Beşiktaş">
        Beşiktaş
    </label>

    <label>
        <input type="radio" name="takim" value="Galatasaray">
        Galatasaray
    </label>

    <label>
        <input type="radio" name="takim" value="Fenerbahçe">
        Fenerbahçe
    </label>

    <button onclick="kayitOl()">Kayıt Ol</button>
    <br>
    <a href="index.html">Anasayfaya Dön</a>
</div>

<script type="module">
// 1. Firebase importları
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// KENDİ FIREBASE BİLGİLERİNİ BURAYA YAPIŞTIR
const firebaseConfig = {
    apiKey: "AIzaSyDa5AWwxhf7mjzf-W-3CT4WBQhuZ0KVedo",
    authDomain: "farepeynir-d1df0.firebaseapp.com",
    projectId: "farepeynir-d1df0",
    storageBucket: "farepeynir-d1df0.firebasestorage.app",
    messagingSenderId: "815151330283",
    appId: "1:815151330283:web:f36af249f1701616351fae"
};

// 2. Firebase Başlatma ve Servisleri Değişkenlere Atama
const app = initializeApp(firebaseConfig);
const auth = getAuth(app); // Eksikti, eklendi.
const db = getFirestore(app); // Eksikti, eklendi.

// Kayıt sistemi
window.kayitOl = async function(){
    const ad = document.getElementById("ad").value;
    const soyad = document.getElementById("soyad").value;
    const email = document.getElementById("email").value;
    const kullaniciAdi = document.getElementById("kullaniciAdi").value;
    const sifre = document.getElementById("sifre").value;

    // Seçilen takım
    const takimSecimi = document.querySelector('input[name="takim"]:checked');
    const takim = takimSecimi ? takimSecimi.value : "";

    if(ad == "" || soyad == "" || email == "" || kullaniciAdi == "" || sifre == ""){
        alert("Lütfen tüm alanları doldurun");
        return;
    }

    try{
        // Firebase Auth kayıt
        const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            sifre
        );

        const user = userCredential.user;

        // Firestore veri kaydı
        await setDoc(doc(db, "kullanicilar", user.uid), {
            ad: ad,
            soyad: soyad,
            email: email,
            kullaniciAdi: kullaniciAdi,
            takim: takim,
            uid: user.uid
        });

        alert("Kayıt başarılı!");
        console.log("Kullanıcı oluşturuldu");

    }catch(error){
        alert("Hata: " + error.message);
        console.error(error);
    }
}
</script>

</body>
</html>
