<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Üyelik Sayfası</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
    <h2>Üye Ol</h2>
    <form id="signup-form">
        <label for="email">E-posta:</label><br>
        <input type="email" id="email" required><br><br>

        <label for="password">Şifre:</label><br>
        <input type="password" id="password" required><br><br>

        <button type="submit">Kayıt Ol</button>
    </form>

    <p id="message"></p>

    <script>
        // 🔑 Firebase Konfigürasyonu
        const firebaseConfig = {
            apiKey: "AIzaSyAC4rdFpx_X9_iNa32i79hrRGMbDjbL0xs",
            authDomain: "ornekproje-b4e47.firebaseapp.com",
            projectId: "ornekproje-b4e47",
            storageBucket: "ornekproje-b4e47.firebasestorage.app",
            messagingSenderId: "375897854755",
            appId: "1:375897854755:web:a8b3cfcdc789e261ab3296",
        };

        // Firebase Başlat
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Form gönderildiğinde
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault(); // sayfanın yenilenmesini engelle

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Kayıt başarılı
                    document.getElementById('message').textContent = "Kayıt başarılı! Hoşgeldiniz: " + userCredential.user.email;
                })
                .catch((error) => {
                    // Hata mesajı
                    document.getElementById('message').textContent = "Hata: " + error.message;
                });
        });
    </script>
</body>
</html>
